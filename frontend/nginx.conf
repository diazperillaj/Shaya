server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # API: se reenvía tal cual al backend (el path /api/v1/... se conserva)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend: estáticos del build de Vite.
    # try_files con fallback a index.html para las rutas de react-router.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache larga para assets con hash en el nombre
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    # Migraciones al día antes de arrancar la API
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Memoria caliente reconstruible desde Postgres: sin volumen.
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]

  chatbot:
    build: ./chatbot
    restart: unless-stopped
    environment:
      ENV: production
      BUSINESS_DB_HOST: db
      BUSINESS_DB_PORT: 5432
      BUSINESS_DB_NAME: ${DB_NAME}
      BUSINESS_DB_USER: chatbot_ro
      BUSINESS_DB_PASSWORD: ${CHATBOT_RO_PASSWORD}
      CHAT_DB_USER: chatbot_app
      CHAT_DB_PASSWORD: ${CHATBOT_APP_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}            # el mismo del backend: valida la cookie
      FRONTEND_URL: ${FRONTEND_URL}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      LLM_MODEL_LIGHT: ${LLM_MODEL_LIGHT:-llama-3.1-8b-instant}
      TZ: America/Bogota
    # Acceso directo en dev/debug (el tráfico real entra por nginx en /chat/)
    ports:
      - "127.0.0.1:8005:8005"
    # Migraciones del schema chat al día antes de arrancar
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8005"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build: ./frontend
    restart: unless-stopped
    # Loopback: acceso local/debug por http://localhost:8080.
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    networks:
      # default: para hablar con el backend (proxy /api).
      default: {}
      # proxy: red compartida para que el Caddy externo lo encuentre
      # por el alias "shaya-web".
      proxy:
        aliases:
          - shaya-web
    depends_on:
      - backend
      - chatbot

# Red compartida con el reverse proxy (Caddy vive en otro compose).
# Debe existir antes: docker network create proxy
networks:
  proxy:
    external: true

volumes:
  pgdata:

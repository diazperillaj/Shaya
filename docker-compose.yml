services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    # Migraciones al día antes de arrancar la API
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    restart: unless-stopped
    # Loopback: acceso local/debug por http://localhost:8080.
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    networks:
      # default: para hablar con el backend (proxy /api).
      default: {}
      # proxy: red compartida para que el Caddy externo lo encuentre
      # por el alias "shaya-web".
      proxy:
        aliases:
          - shaya-web
    depends_on:
      - backend

# Red compartida con el reverse proxy (Caddy vive en otro compose).
# Debe existir antes: docker network create proxy
networks:
  proxy:
    external: true

volumes:
  pgdata:
